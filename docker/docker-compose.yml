services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chisimba-web
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - ../framework:/opt/chisimba-source:ro
      - ../runtime/webroot:/var/www/html/ch
      - ../runtime/packages:/var/www/html/ch/packages
      - ../runtime/usrfiles:/var/www/html/ch/usrfiles
      - ../runtime/error_logs:/var/www/html/ch/error_logs
      - ../runtime/config:/var/www/html/ch/config
    environment:
      CHISIMBA_WEBROOT: /var/www/html/ch
      CHISIMBA_SOURCE: /opt/chisimba-source

  db:
    image: mariadb:10.5
    container_name: chisimba-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chisimba
      MYSQL_USER: chisimba
      MYSQL_PASSWORD: chisimba
    volumes:
      - chisimba_db_data:/var/lib/mysql

volumes:
  chisimba_db_data:
