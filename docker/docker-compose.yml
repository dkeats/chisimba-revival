services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: chisimba-web
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - chisimba_webroot:/var/www/html/ch
    environment:
      CHISIMBA_WEBROOT: /var/www/html/ch
    networks:
      - chisimba

  db:
    image: mariadb:10.3
    container_name: chisimba-db
    environment:
      MYSQL_ROOT_PASSWORD: root
#      MYSQL_DATABASE: chisimba
      MYSQL_USER: chisimba
      MYSQL_PASSWORD: chisimba
    volumes:
      - chisimba_db:/var/lib/mysql
    networks:
      - chisimba

volumes:
  chisimba_webroot:
  chisimba_db:

networks:
  chisimba:
