error_reporting = E_ALL & ~E_DEPRECATED & ~E_NOTICE & ~E_STRICT
display_errors = On
log_errors = On
error_log = /var/www/html/ch/error_logs/php-error.log
memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
include_path = ".:/var/www/html/ch/lib/pear:/usr/local/lib/php:/usr/local/lib/php/PEAR"
