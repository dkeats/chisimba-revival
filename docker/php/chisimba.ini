display_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /tmp/chisimba-php-error.log
memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
include_path = ".:/usr/local/lib/php:/usr/local/lib/php/PEAR:/workspace/framework/app/lib/pear"
date.timezone = Africa/Johannesburg
short_open_tag = On
