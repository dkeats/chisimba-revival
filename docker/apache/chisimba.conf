<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/ch>
        AllowOverride All
        Require all granted
        Options FollowSymLinks Indexes
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/chisimba-error.log
    CustomLog ${APACHE_LOG_DIR}/chisimba-access.log combined
</VirtualHost>
